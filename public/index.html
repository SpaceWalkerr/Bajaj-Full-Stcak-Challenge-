<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hierarchy Analyzer - Graph Processing Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-container">
      <header class="header">
        <div class="header-glow"></div>
        <div class="header-content">
          <div class="logo-section">
            <div class="logo-box">
              <div class="logo-inner">�</div>
            </div>
            <div class="logo-text">
              <h1 class="app-title">Hierarchy Analyzer</h1>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="container">
          <div class="layout-grid">
            <section class="input-panel">
              <div class="panel-header">
                <div>
                  <h2>Input</h2>
                  <p class="panel-hint">Define node relationships</p>
                </div>
                <button id="sample-btn" class="btn-secondary" title="Load sample data to see how it works">Sample Data</button>
              </div>

              <div class="input-wrapper">
                <textarea
                  id="node-input"
                  class="input-textarea"
                  placeholder="A->B&#10;A->C&#10;B->D&#10;...&#10;&#10;Enter relationships (one per line)"
                  spellcheck="false"
                >A->B
A->C
B->D</textarea>
                <div class="input-footer">
                  <span class="format-hint">Format: <code>X->Y</code> (uppercase letters)</span>
                </div>
              </div>

              <button id="submit-btn" class="btn-primary">Analyze</button>

              <div id="status" class="status-message" aria-live="polite"></div>
            </section>

            <section class="output-panel">
              <div class="panel-header">
                <div>
                  <h2>Results</h2>
                  <p class="panel-hint">Analysis output</p>
                </div>
              </div>

              <div id="summary-cards" class="summary-grid"></div>

              <div class="tabs-wrapper">
                <div class="tabs-nav">
                  <button class="tab-btn active" data-tab="hierarchies">Trees & Cycles</button>
                  <button class="tab-btn" data-tab="errors">Issues</button>
                  <button class="tab-btn" data-tab="json">JSON</button>
                </div>

                <div id="hierarchies-content" class="tab-content active"></div>

                <div id="errors-content" class="tab-content">
                  <div class="errors-grid">
                    <div id="invalid-entries" class="error-box"></div>
                    <div id="duplicate-edges" class="error-box"></div>
                  </div>
                </div>

                <div id="json-content" class="tab-content">
                  <div class="json-viewer">
                    <pre id="raw-json">{}</pre>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </main>

      <footer class="footer">
        <p>Made by Suraj Nandan</p>
      </footer>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
